# =============================================================================
# WAHA - WhatsApp HTTP API
# Stack para Portainer - Deploy via Git Repository
# Documentación: https://waha.devlike.pro/docs/how-to/install/
# =============================================================================

services:
  waha:
    image: devlikeapro/waha:latest
    # Si tienes WAHA Plus, cambia a:
    # image: devlikeapro/waha-plus
    # Si usas ARM (Raspberry Pi, etc.), cambia a:
    # image: devlikeapro/waha:arm
    # container_name: waha # Swarm no soporta nombres fijos de contenedor
    # restart: always # En Swarm se usa 'deploy'
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager # Opcional: asegurar que corra en el manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.waha.rule=Host(`${WAHA_DOMAIN:-waha.pegasus360agency.com}`)"
        - "traefik.http.routers.waha.entrypoints=websecure"
        - "traefik.http.routers.waha.tls=true"
        - "traefik.http.routers.waha.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.waha.loadbalancer.server.port=3000"
        - "traefik.http.routers.waha.service=waha"

    # DNS para resolver web.whatsapp.com correctamente
    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Importante para que el navegador no se bloquee
    shm_size: '2gb'

    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'

    # Eliminamos el mapeo de puertos directo ya que usaremos Traefik
    # ports:
    #   - '3000:3000'

    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media

    networks:
      - default
      - pegasus_net


    environment:
      # =====================================================
      # CREDENCIALES - ¡CAMBIAR ANTES DE USAR EN PRODUCCIÓN!
      # =====================================================
      # API Key para autenticación de requests
      - WAHA_API_KEY=${WAHA_API_KEY:-your-api-key-change-me}

      # Dashboard credentials
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-your-password-change-me}

      # Sesión y Tiempo
      - TZ=America/Bogota
      - WHATSAPP_IDLE_TIMEOUT=0

      # Swagger UI credentials
      - WHATSAPP_SWAGGER_USERNAME=${WHATSAPP_SWAGGER_USERNAME:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD:-your-password-change-me}

      # =====================================================
      # CONFIGURACIÓN GENERAL
      # =====================================================
      # URL base (cambiar a tu dominio real)
      - WAHA_BASE_URL=${WAHA_BASE_URL:-https://waha.pegasus360agency.com}

      # Configuración de webhooks (para n8n u otras integraciones)
      # - WHATSAPP_HOOK_URL=${WHATSAPP_HOOK_URL:-}
      # - WHATSAPP_HOOK_EVENTS=${WHATSAPP_HOOK_EVENTS:-message,message.any,state.change,group.join,group.leave}

      # Motor de WhatsApp (WEBJS o NOWEB)
      # NOWEB es más rápido y ligero, WEBJS es más completo
      # - WHATSAPP_DEFAULT_ENGINE=${WHATSAPP_DEFAULT_ENGINE:-WEBJS}

    # Limites de recursos (ajustar según tu servidor)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    #       cpus: '2.0'
    #     reservations:
    #       memory: 512M
    #       cpus: '0.5'

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -S http://localhost:3000/health 2>&1 | grep -q 'HTTP/1.1 200\\|HTTP/1.1 401'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  waha_sessions:
    driver: local
  waha_media:
    driver: local

networks:
  pegasus_net:
    external: true
